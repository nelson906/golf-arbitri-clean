name: CI

# Cancello automatico della suite di test.
# Gira a ogni push su main e su ogni pull request.
# Fornisce il MySQL che la suite richiede (la guardia assertDatabaseIsTest()
# pretende un DB il cui nome contenga "test": qui è golf_arbitri_clean_test).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    # MySQL effimero per il job. Accessibile su 127.0.0.1:3306.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: golf_arbitri_clean_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      # Variabili reali del processo: avendo precedenza sul file .env.testing
      # (Dotenv immutable non sovrascrive ciò che è già nell'ambiente),
      # neutralizzano i valori MAMP-specifici (socket, porta 8889).
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: golf_arbitri_clean_test
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_SOCKET: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        # Allineato all'ambiente reale: MAMP locale 8.5.6, Aruba (produzione) 8.5.5.
        # Il composer.lock è risolto su 8.5, quindi la CI DEVE usare 8.5 per
        # installare senza conflitti di piattaforma.
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, pdo, pdo_mysql, bcmath, intl, gd, zip
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build front-end assets
        # Necessario: diversi test fanno GET di pagine che renderizzano @vite.
        # Senza public/build/manifest.json le view lanciano
        # "Vite manifest not found". In locale passa perché gli asset sono già
        # compilati (public/build è gitignored, quindi assente in CI).
        run: |
          npm ci
          npm run build

      - name: Prepare test environment file
        # .env.testing è tarato su MAMP (socket Unix, porta 8889). In CI usiamo
        # il MySQL del service: rimuoviamo il socket e allineiamo porta/password.
        # APP_KEY e DB_DATABASE (nome "test") restano quelli del file.
        run: |
          sed -i '/^DB_SOCKET=/d' .env.testing
          sed -i 's|^DB_HOST=.*|DB_HOST=127.0.0.1|' .env.testing
          sed -i 's|^DB_PORT=.*|DB_PORT=3306|' .env.testing
          sed -i 's|^DB_PASSWORD=.*|DB_PASSWORD=root|' .env.testing

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              echo "MySQL pronto"; break
            fi
            echo "Attendo MySQL... ($i)"; sleep 2
          done

      - name: Clear config cache
        run: php artisan config:clear

      - name: Run test suite
        run: php artisan test --env=testing

  deploy:
    name: Deploy FTP Aruba (incrementale)
    needs: tests
    # Deploy MANUALE: parte solo da Actions -> Run workflow (workflow_dispatch),
    # mai in automatico su push. I test girano comunque prima (needs: tests).
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, pdo, pdo_mysql, bcmath, intl, gd, zip
          coverage: none
          tools: composer:v2

      - name: Install Composer (produzione, no dev)
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction --no-progress

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build front-end (Vite -> public/build)
        run: |
          npm ci
          npm run build

      - name: Deploy incrementale via lftp (fix passive-mode Aruba)
        # SamKirkland/basic-ftp non sa forzare PASV (Aruba risponde male all'EPSV
        # -> "Can't parse EPSV") ne' ignorare l'indirizzo passivo "foreign"
        # (-> 425 Rejected data connection). lftp ha le manopole giuste:
        #   ftp:prefer-epsv no     -> usa PASV, niente EPSV
        #   ftp:fix-pasv-address   -> ignora l'IP passivo del server, niente 425
        #   ftp:ssl-allow no       -> FTP semplice (l'FTPS Aruba dava TLS decode error)
        # Incrementale per dimensione (mirror --ignore-time): il checkout git
        # azzera le mtime, quindi confrontiamo sulla size, non sulla data.
        # --delete tiene pulito il server. storage/ e .env esclusi -> dati e
        # config del server restano INTATTI.
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<SCRIPT
          set ftp:ssl-allow no
          set ftp:prefer-epsv no
          set ftp:passive-mode on
          set ftp:fix-pasv-address yes
          set net:timeout 15
          set net:max-retries 3
          set net:persist-retries 3
          set mirror:parallel-transfer-count 1
          mirror -R --ignore-time --delete --no-perms --verbose -x '(^|/)(\.git|\.github|node_modules|tests|storage|_audit_archive|\.scannerwork)(/|\$)' -x '(^|/)public/storage(/|\$)' -x '(^|/)\.env(\.|\$)' -X '*.md' ./ "$FTP_SERVER_DIR"
          bye
          SCRIPT
