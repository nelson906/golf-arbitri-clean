name: CI

# Cancello automatico della suite di test.
# Gira a ogni push su main e su ogni pull request.
# Fornisce il MySQL che la suite richiede (la guardia assertDatabaseIsTest()
# pretende un DB il cui nome contenga "test": qui è golf_arbitri_clean_test).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    # MySQL effimero per il job. Accessibile su 127.0.0.1:3306.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: golf_arbitri_clean_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      # Variabili reali del processo: avendo precedenza sul file .env.testing
      # (Dotenv immutable non sovrascrive ciò che è già nell'ambiente),
      # neutralizzano i valori MAMP-specifici (socket, porta 8889).
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: golf_arbitri_clean_test
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_SOCKET: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        # Allineato all'ambiente reale: MAMP locale 8.5.6, Aruba (produzione) 8.5.5.
        # Il composer.lock è risolto su 8.5, quindi la CI DEVE usare 8.5 per
        # installare senza conflitti di piattaforma.
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, pdo, pdo_mysql, bcmath, intl, gd, zip
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build front-end assets
        # Necessario: diversi test fanno GET di pagine che renderizzano @vite.
        # Senza public/build/manifest.json le view lanciano
        # "Vite manifest not found". In locale passa perché gli asset sono già
        # compilati (public/build è gitignored, quindi assente in CI).
        run: |
          npm ci
          npm run build

      - name: Prepare test environment file
        # .env.testing è tarato su MAMP (socket Unix, porta 8889). In CI usiamo
        # il MySQL del service: rimuoviamo il socket e allineiamo porta/password.
        # APP_KEY e DB_DATABASE (nome "test") restano quelli del file.
        run: |
          sed -i '/^DB_SOCKET=/d' .env.testing
          sed -i 's|^DB_HOST=.*|DB_HOST=127.0.0.1|' .env.testing
          sed -i 's|^DB_PORT=.*|DB_PORT=3306|' .env.testing
          sed -i 's|^DB_PASSWORD=.*|DB_PASSWORD=root|' .env.testing

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              echo "MySQL pronto"; break
            fi
            echo "Attendo MySQL... ($i)"; sleep 2
          done

      - name: Clear config cache
        run: php artisan config:clear

      - name: Run test suite
        run: php artisan test --env=testing

  deploy:
    name: Deploy FTP Aruba (incrementale)
    needs: tests
    # Deploy MANUALE: parte solo da Actions -> Run workflow (workflow_dispatch),
    # mai in automatico su push. I test girano comunque prima (needs: tests).
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Storia completa: serve a `git diff <ultimo_sha_deployato> HEAD`
          # per calcolare i soli file cambiati (deploy incrementale reale).
          fetch-depth: 0

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, pdo, pdo_mysql, bcmath, intl, gd, zip
          coverage: none
          tools: composer:v2

      - name: Install Composer (produzione, no dev)
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction --no-progress

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build front-end (Vite -> public/build)
        run: |
          npm ci
          npm run build

      - name: Deploy incrementale via lftp (git-diff, fix passive-mode Aruba)
        # PERCHE' lftp e non SamKirkland/basic-ftp: Aruba risponde male all'EPSV
        # ("Can't parse response to 'EPSV'") e rifiuta il canale dati passivo se
        # l'IP non combacia ("425 Rejected data connection from foreign address").
        # Servono manopole che basic-ftp non espone:
        #   ftp:prefer-epsv no     -> usa PASV, niente EPSV
        #   ftp:fix-pasv-address   -> ignora l'IP passivo "foreign", niente 425
        #   ftp:ssl-allow no       -> FTP semplice (l'FTPS Aruba dava TLS decode error)
        #
        # PERCHE' git-diff e non `mirror`: `mirror -R` deve ELENCARE e confrontare
        # l'intero albero remoto (vendor/ = ~12.5k file) su una sola connessione,
        # ogni volta, anche per cambiare un solo file -> 40+ minuti di sola
        # scansione. Qui invece carichiamo SOLO i file che git segna come cambiati
        # rispetto all'ultimo commit deployato (marker .deploy-state.sha sul
        # server). Niente scansione dell'albero -> deploy in secondi.
        #
        # Generati (gitignored, non compaiono nel diff) gestiti a parte:
        #   - public/build : sempre rimirrorato (dir piccola, scansione in secondi)
        #                    cosi' gli asset Vite restano sempre coerenti.
        #   - vendor       : risincronizzato SOLO quando cambia composer.lock.
        # storage/ e .env restano INTATTI (gitignored: mai nel diff, mai cancellati).
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          set -euo pipefail
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp

          DIR="$FTP_SERVER_DIR"
          # Impostazioni lftp comuni (anti-quirk Aruba) riusate in ogni sessione.
          LFTP_SET="set ftp:ssl-allow no; set ftp:prefer-epsv no; set ftp:passive-mode on; set ftp:fix-pasv-address yes; set net:timeout 15; set net:max-retries 3; set net:persist-retries 3; set mirror:parallel-transfer-count 1;"

          # File da NON caricare/cancellare mai (stesse esclusioni di prima).
          is_excluded() {
            case "$1" in
              .git/*|.github/*|tests/*|_audit_archive/*|.scannerwork/*) return 0 ;;
              .env|.env.*|storage/*|public/storage/*|public/build/*) return 0 ;;
              *.md) return 0 ;;
              *) return 1 ;;
            esac
          }

          # 1) Recupera l'ultimo SHA deployato dal marker sul server (se esiste).
          rm -f prev_sha.txt
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" \
            -e "$LFTP_SET get \"$DIR/.deploy-state.sha\" -o prev_sha.txt; bye" || true
          PREV=""
          if [ -s prev_sha.txt ]; then PREV="$(tr -d ' \t\r\n' < prev_sha.txt)"; fi

          # Marker assente o SHA non piu' in storia (rebase/force-push) -> bootstrap.
          MODE="incremental"
          if [ -z "$PREV" ] || ! git cat-file -e "${PREV}^{commit}" 2>/dev/null; then
            MODE="bootstrap"
          fi
          echo "Deploy mode: $MODE (prev=${PREV:-none} head=$GITHUB_SHA)"

          echo "$GITHUB_SHA" > deploy-state.sha

          if [ "$MODE" = "bootstrap" ]; then
            # Primo deploy / recupero: mirror completo una tantum, poi scrive marker.
            lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<SCRIPT
          $LFTP_SET
          mirror -R --ignore-time --delete --no-perms --verbose -x '(^|/)(\.git|\.github|node_modules|tests|storage|_audit_archive|\.scannerwork)(/|\$)' -x '(^|/)public/storage(/|\$)' -x '(^|/)\.env(\.|\$)' -X '*.md' ./ "$DIR"
          put deploy-state.sha -o "$DIR/.deploy-state.sha"
          bye
          SCRIPT
            exit 0
          fi

          # 2) INCREMENTALE: costruisci i comandi lftp dai soli file cambiati.
          CMDS=""
          VENDOR_CHANGED=0
          while IFS=$'\t' read -r status p1 p2; do
            [ -z "${status:-}" ] && continue
            case "$status" in
              R*) old="$p1"; new="$p2"
                  [ "$old" = "composer.lock" ] && VENDOR_CHANGED=1
                  [ "$new" = "composer.lock" ] && VENDOR_CHANGED=1
                  if ! is_excluded "$old"; then CMDS="$CMDS"$'\n'"rm -f \"$DIR/$old\""; fi
                  if ! is_excluded "$new"; then
                    CMDS="$CMDS"$'\n'"mkdir -p -f \"$DIR/$(dirname "$new")\""$'\n'"put \"$new\" -o \"$DIR/$new\""
                  fi ;;
              D*) p="$p1"
                  [ "$p" = "composer.lock" ] && VENDOR_CHANGED=1
                  if ! is_excluded "$p"; then CMDS="$CMDS"$'\n'"rm -f \"$DIR/$p\""; fi ;;
              *)  p="$p1"
                  [ "$p" = "composer.lock" ] && VENDOR_CHANGED=1
                  if ! is_excluded "$p"; then
                    CMDS="$CMDS"$'\n'"mkdir -p -f \"$DIR/$(dirname "$p")\""$'\n'"put \"$p\" -o \"$DIR/$p\""
                  fi ;;
            esac
          done < <(git diff --name-status -M "$PREV" "$GITHUB_SHA")

          # public/build: sempre risincronizzato (dir piccola) -> Vite coerente.
          CMDS="$CMDS"$'\n'"mirror -R --delete --no-perms --ignore-time public/build \"$DIR/public/build\""

          # vendor: solo se composer.lock e' cambiato (altrimenti niente scansione 12.5k file).
          if [ "$VENDOR_CHANGED" = "1" ]; then
            echo "composer.lock cambiato -> risincronizzo vendor/"
            CMDS="$CMDS"$'\n'"mirror -R --delete --no-perms --ignore-time vendor \"$DIR/vendor\""
          fi

          # Aggiorna il marker per il prossimo deploy.
          CMDS="$CMDS"$'\n'"put deploy-state.sha -o \"$DIR/.deploy-state.sha\""

          # Un'unica sessione lftp (un solo login) con tutti i comandi.
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<SCRIPT
          $LFTP_SET
          $CMDS
          bye
          SCRIPT
